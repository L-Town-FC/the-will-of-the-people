services:
  bot:
    container_name: bot
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/l-town-fc/the-will-of-the-people
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PRODBOTTOKEN: ${PRODBOTTOKEN:?PRODBOTTOKEN is required}
      JSONPATH: /usr/src/bot/volume
    volumes:
      - bot-vol:/usr/src/bot/volume

volumes:
  bot-vol:
