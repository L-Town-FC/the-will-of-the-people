---
# Builds and pushes the multi-arch bot image for main branch updates
# and new semver release tags.
# Main branch pushes publish `latest` and the short commit SHA.
# Semver tag pushes publish only the semver tag.
# The job also skips automated version-bump commits when they land
# with the expected `chore: bump version to v...` message so release
# automation does not publish `latest` for those bumps.
name: buildx

"on":
  push:
    branches: [main]
    tags:
      - "v*.*.*"
      - "*.*.*"
    paths-ignore:
      - ".github/workflows/**"
      - "test/**"
      - "**/*.test.js"
      - "**/*.spec.js"
      - "**/test_*.js"
      - "**/__tests__/**"
  workflow_dispatch:
    inputs:
      release_tag:
        description: >-
          Optional semver tag to publish explicitly, for example v2.2.1.
          When set, this run publishes only that tag.
        required: false
        type: string

jobs:
  buildx:
    if: >-
      ${{
        github.ref_type == 'tag' ||
        (github.event_name == 'workflow_dispatch') ||
        !contains(github.event.head_commit.message, 'bump version')
      }}
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.docker_username }}/bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_password }}

      - name: Prepare image tags
        id: prep
        shell: bash
        run: |
          release_tag="${{ inputs.release_tag }}"
          short_sha="${GITHUB_SHA::7}"
          app_version="unknown"
          {
            echo 'tags<<EOF'
            if [[ -n "${release_tag}" ]]; then
              echo "${IMAGE_NAME}:${release_tag}"
              app_version="${release_tag}"
            elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              # GitHub Releases trigger this workflow by creating
              # a new matching tag push.
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"
              app_version="${GITHUB_REF_NAME}"
            elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              echo "${IMAGE_NAME}:latest"
              echo "${IMAGE_NAME}:${short_sha}"
              app_version="${short_sha}"
            fi
            echo 'EOF'
            echo "app_version=${app_version}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          build-args: |
            APP_VERSION=${{ steps.prep.outputs.app_version }}
