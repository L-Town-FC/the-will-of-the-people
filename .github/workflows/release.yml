---
# Release flow:
# 1. Run this workflow with a version (e.g., v2.4.0)
# 2. Creates git tag, GitHub release, and deploys to production
# 
# Package.json version is independent - used only for npm dependencies.
name: release

"on":
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2.4.0)'
        required: true
        type: string

permissions:
  actions: write
  contents: write
  pull-requests: write

env:
  GH_TOKEN: ${{ github.token }}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set version variables
        id: current
        run: |
          version="${{ inputs.version }}"
          release_tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${release_tag}"

      - name: Check if release already exists
        id: release_state
        run: |
          release_tag="${{ steps.current.outputs.release_tag }}"
          if gh release view "${release_tag}" >/dev/null 2>&1; then
            echo "::error::Release ${release_tag} already exists!"
            echo "Delete it first or use a new version."
            exit 1
          fi
          echo "Release ${release_tag} does not exist - ready to create"

      - name: Create and push tag
        run: |
          release_tag="${{ steps.current.outputs.release_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$release_tag" -m "Release $release_tag"
          git push origin "$release_tag"
          echo "Pushed tag: ${release_tag}"

      - name: Generate release notes
        id: notes
        run: |
          current_tag="${{ steps.current.outputs.release_tag }}"
          
          previous_tag=$(gh api "repos/${{ github.repository }}/releases/latest" --jq '.tag_name' 2>/dev/null || echo "")
          
          notes_file="$RUNNER_TEMP/release-notes.md"
          
          contributors=$(git log --no-merges --reverse --pretty='%aL' "${previous_tag}..${current_tag}" 2>/dev/null | sort -u | tr '\n' ', ' | sed 's/,$//')
          
          {
            echo "# ${current_tag}"
            echo
            if [[ -n "$previous_tag" ]] && [[ "$previous_tag" != "$current_tag" ]]; then
              echo "Changes since ${previous_tag}."
              echo
              echo "Compare:"
              echo "https://github.com/${{ github.repository }}/compare/${previous_tag}...${current_tag}"
              echo
              echo "## Changes"
              git log --no-merges --reverse --pretty='- %s (@%aL, %h)' "${previous_tag}..${current_tag}" 2>/dev/null || echo "(No changes)"
            else
              echo "Initial release"
              echo
              echo "## Latest changes"
              git log --no-merges --pretty='- %s (@%aL, %h)' -n 15 HEAD
            fi
            if [[ -n "$contributors" ]]; then
              echo
              echo "## Contributors"
              echo "$contributors"
            fi
          } > "${notes_file}"
          
          echo "file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        run: |
          gh release create "${{ steps.current.outputs.release_tag }}" \
            --title "${{ steps.current.outputs.release_tag }}" \
            --notes-file "${{ steps.notes.outputs.file }}" \
            --generate-notes

      - name: Trigger production deployment
        id: deploy
        run: |
          version="${{ steps.current.outputs.version }}"
          run_response=$(gh workflow run build-and-deploy.yml -f target=rpi5 -f version="$version")
          run_id=$(echo "$run_response" | grep -oP 'https://github.com/.*/actions/runs/\K[0-9]+')
          echo "Deployment triggered: ${run_id}"
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment
        if: steps.deploy.outputs.run_id
        run: |
          gh run watch "${{ steps.deploy.outputs.run_id }}" --exit-status

      - name: Summary
        run: |
          echo "=== Release Complete ==="
          echo "Version: ${{ steps.current.outputs.release_tag }}"
          echo "Deployed to: rpi5 (production)"

      - name: Post to Discord
        if: success()
        run: |
          VERSION="${{ steps.current.outputs.release_tag }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$VERSION"
          
          release_notes=$(cat "${{ steps.notes.outputs.file }}")
          
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚀 New Build Deployed - Based & Operational\",
                \"description\": \"**${VERSION}** is now live on the Pi. The realm endures. Another W in the bag.\\n\\n${release_notes}\",
                \"url\": \"${RELEASE_URL}\",
                \"color\": 5763714,
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"
