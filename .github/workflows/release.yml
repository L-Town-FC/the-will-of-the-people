---
# Release flow:
# 1. Manual button click (workflow_dispatch, optional dry_run input)
# 2. Auto-detect version bump — checks PR semver labels first, then falls
#    back to conventional commit analysis.
# 3. Guard against no changes since last release
# 4. Create git tag, GitHub release, and deploy to production
#
# Version bump priority:
#   1. PR semver:major / semver:minor / semver:patch labels (highest wins)
#   2. Conventional commits: BREAKING CHANGE or !: = major, feat: = minor
#   3. Default: patch
#
# Release notes are categorised by conventional commit type.
# Commits with skip-changelog label are excluded.
#
# Package.json version is independent - used only for npm dependencies.
name: release

"on":
  workflow_dispatch:
    inputs:
      dry_run:
        description: >-
          If true, computes version and shows release notes preview
          without creating a tag, release, or deploying.
        required: false
        type: boolean
        default: false

permissions:
  actions: write
  contents: write

env:
  GH_TOKEN: ${{ github.token }}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Compute version bump
        id: version
        run: |
          # Get last release tag
          last_tag=$(git tag --sort=-v:refname | head -n1 2>/dev/null || echo "")
          
          # Get commits since last release
          if [ -z "$last_tag" ]; then
            commits=$(git log --oneline)
            log_range=""
          else
            commits=$(git log --oneline ${last_tag}..HEAD)
            log_range="${last_tag}..HEAD"
          fi
          
          # Guard against no changes
          if [ -z "$commits" ]; then
            echo "::error::No changes since last release (${last_tag}). Aborting release."
            exit 1
          fi
          
          # --- Phase 1: Check PR labels for semver override ---
          bump="patch"
          semver_source="conventional-commits"
          
          # Extract PR numbers from merge & squash commit messages
          pr_numbers=$(echo "$commits" | grep -oP '#\K\d+' | sort -u)
          
          if [ -n "$pr_numbers" ]; then
            echo "Found PRs: $(echo "$pr_numbers" | tr '\n' ' ')"
            semver_major=0
            semver_minor=0
            for pr in $pr_numbers; do
              labels=$(gh api "repos/${{ github.repository }}/issues/$pr/labels" \
                --jq '.[].name' 2>/dev/null || echo "")
              if echo "$labels" | grep -q "semver:major"; then
                semver_major=1
                echo "  PR #$pr → semver:major"
              elif echo "$labels" | grep -q "semver:minor"; then
                semver_minor=1
                echo "  PR #$pr → semver:minor"
              fi
            done
            if [ $semver_major -eq 1 ]; then
              bump="major"
              semver_source="pr-labels"
            elif [ $semver_minor -eq 1 ]; then
              bump="minor"
              semver_source="pr-labels"
            fi
          fi
          
          # --- Phase 2: Fall back to conventional commits ---
          if [ "$bump" = "patch" ]; then
            has_major=0
            has_minor=0
            
            if [ -z "$last_tag" ]; then
              breaking=$(git log --format="%B" | grep -E 'BREAKING CHANGE' || true)
            else
              breaking=$(git log ${log_range} --format="%B" | grep -E 'BREAKING CHANGE' || true)
            fi
            if [ -n "$breaking" ] || echo "$commits" | grep -qE '!:' ; then
              has_major=1
            fi
            
            if echo "$commits" | grep -qE '^[a-f0-9]+ feat:' ; then
              has_minor=1
            fi
            
            if [ $has_major -eq 1 ]; then
              bump="major"
            elif [ $has_minor -eq 1 ]; then
              bump="minor"
            fi
          fi
          
          echo "Bump: ${bump} (source: ${semver_source})"
          
          # Compute new version
          if [ -z "$last_tag" ]; then
            new_version="1.0.0"
          else
            version_num=${last_tag#v}
            IFS='.' read -r major minor patch <<< "$version_num"
            case $bump in
              major)
                new_version="$((major + 1)).0.0"
                ;;
              minor)
                new_version="${major}.$((minor + 1)).0"
                ;;
              patch)
                new_version="${major}.${minor}.$((patch + 1))"
                ;;
            esac
          fi
          
          release_tag="v${new_version}"
          echo "version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "last_tag=${last_tag}" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: release_state
        run: |
          release_tag="${{ steps.version.outputs.release_tag }}"
          if gh release view "${release_tag}" >/dev/null 2>&1; then
            if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
              echo "::warning::Release ${release_tag} already exists — would fail on real run."
            else
              echo "::error::Release ${release_tag} already exists!"
              echo "Delete it first or trigger a new release with new commits."
              exit 1
            fi
          else
            echo "Release ${release_tag} does not exist - ready to create"
          fi

      - name: Create and push tag
        if: github.event.inputs.dry_run != 'true'
        run: |
          release_tag="${{ steps.version.outputs.release_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$release_tag" -m "Release $release_tag"
          git push origin "$release_tag"
          echo "Pushed tag: ${release_tag}"

      - name: Generate release notes
        id: notes
        run: |
          current_tag="${{ steps.version.outputs.release_tag }}"
          previous_tag="${{ steps.version.outputs.last_tag }}"
          
          notes_file="$RUNNER_TEMP/release-notes.md"
          commits_file="$RUNNER_TEMP/commits.json"
          
          # Get commits with GitHub usernames via API
          if [ -n "$previous_tag" ]; then
            gh api "repos/${{ github.repository }}/compare/${previous_tag}...${current_tag}" \
              --jq '.commits | map({message: .commit.message, sha: .sha, login: (.author.login // "unknown")})' \
              > "$commits_file" 2>/dev/null || echo "[]" > "$commits_file"
          else
            gh api "repos/${{ github.repository }}/commits?per_page=15" \
              --jq 'map({message: .commit.message, sha: .sha, login: (.author.login // "unknown")})' \
              > "$commits_file" 2>/dev/null || echo "[]" > "$commits_file"
          fi
          
          # Write release notes with categorized sections
          {
            echo "# ${current_tag}"
            echo
            if [[ -n "$previous_tag" ]] && [[ "$previous_tag" != "$current_tag" ]]; then
              echo "Changes since ${previous_tag}."
              echo
              echo "**Compare:** [${previous_tag}...${current_tag}](https://github.com/${{ github.repository }}/compare/${previous_tag}...${current_tag})"
              echo
            else
              echo "Initial release"
              echo
            fi
            
            contributors=$(jq -r 'map(.login) | unique | join(", ")' "$commits_file")
            
            # Categorised sections
            for spec in "feat:New Features" "fix:Bug Fixes" "docs:Documentation" "refactor:Refactoring" "test:Testing" "chore:Chores" "other:Other Changes"; do
              IFS=':' read -r prefix heading <<< "$spec"
              
              if [ "$prefix" = "other" ]; then
                entries=$(jq -r '
                  .[] | select(.message |
                    test("^(feat|fix|docs|refactor|test|chore)(\\(.+\\))?!?:") | not) |
                  "- " + (.message | gsub("\n"; " ") | split(" ")[0:12] | join(" ")) +
                  " ([@" + .login + "](https://github.com/" + .login +
                  ")), [" + (.sha[0:7]) +
                  "](https://github.com/${{ github.repository }}/commit/" + .sha + ")"
                ' "$commits_file")
              else
                entries=$(jq -r --arg p "^${prefix}(\\(.+\\))?!?:" '
                  .[] | select(.message | test($p)) |
                  "- " + (.message | gsub("\n"; " ") | split(" ")[0:12] | join(" ")) +
                  " ([@" + .login + "](https://github.com/" + .login +
                  ")), [" + (.sha[0:7]) +
                  "](https://github.com/${{ github.repository }}/commit/" + .sha + ")"
                ' "$commits_file")
              fi
              
              if [[ -n "$entries" ]]; then
                echo "### ${heading}"
                echo "$entries"
                echo
              fi
            done
            
            if [[ -n "$contributors" ]] && [[ "$contributors" != "null" ]]; then
              echo "## Contributors"
              echo "$contributors"
            fi
          } > "${notes_file}"
          
          echo "file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: github.event.inputs.dry_run != 'true'
        run: |
          gh release create "${{ steps.version.outputs.release_tag }}" \
            --title "${{ steps.version.outputs.release_tag }}" \
            --notes-file "${{ steps.notes.outputs.file }}"

      - name: Trigger production deployment
        if: github.event.inputs.dry_run != 'true'
        id: deploy
        run: |
          version="${{ steps.version.outputs.version }}"
          release_tag="${{ steps.version.outputs.release_tag }}"
          gh workflow run build-and-deploy.yml -f target=rpi5 -f version="$version" -f ref="$release_tag"
          echo "Waiting for workflow to be queued..."
          # Poll for the workflow run to appear (timeout after 30s)
          run_id=""
          for i in $(seq 1 6); do
            sleep 5
            run_id=$(gh run list --workflow=build-and-deploy.yml --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
            if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
              echo "Deployment triggered: ${run_id}"
              echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"
              break
            fi
            echo "Still waiting for workflow run... (attempt $i)"
          done
          if [ -z "$run_id" ] || [ "$run_id" == "null" ]; then
            echo "::error::Failed to get workflow run ID"
            exit 1
          fi

      - name: Wait for deployment
        if: steps.deploy.outputs.run_id && github.event.inputs.dry_run != 'true'
        run: |
          gh run watch "${{ steps.deploy.outputs.run_id }}" --exit-status

      - name: Dry-run summary
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "=== DRY RUN - No changes made ==="
          echo ""
          echo "Would create tag: ${{ steps.version.outputs.release_tag }}"
          echo "Would create GitHub release with categorized notes"
          echo "Would trigger production deployment to rpi5"
          echo ""
          echo "Release notes preview:"
          echo "---"
          cat "${{ steps.notes.outputs.file }}"
          echo "---"

      - name: Post to Discord
        if: success() && github.event.inputs.dry_run != 'true'
        run: |
          VERSION="${{ steps.version.outputs.release_tag }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$VERSION"
          
          # Get release notes content (truncate to fit Discord 1024 char limit)
          changes=$(head -c 900 "${{ steps.notes.outputs.file }}")
          
          # Build JSON payload using jq for proper encoding
          jq -n \
            --arg title "🚀 New Build Deployed - Based & Operational" \
            --arg desc "**${VERSION}** is now live on the Pi. The realm endures. Another W in the bag.\n\nCheck out the [release notes](${RELEASE_URL}) for details." \
            --arg changes "$changes" \
            '{
              "embeds": [{
                "title": $title,
                "description": $desc,
                "url": $RELEASE_URL,
                "color": 5763714,
                "fields": [{
                  "name": "Changes",
                  "value": $changes,
                  "inline": false
                }],
                "timestamp": (now | todate)
              }]
            }' > /tmp/discord_payload.json
          
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/discord_payload.json
