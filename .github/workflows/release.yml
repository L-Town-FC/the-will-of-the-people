---
# Release flow:
# 1. Run this workflow (no inputs required)
# 2. Auto-detects next version based on commits since last release
# 3. Creates git tag, GitHub release with clickable links, and deploys to production
# 4. Skips if no changes detected
#
# Package.json version is independent - used only for npm dependencies.
name: release

"on":
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

env:
  GH_TOKEN: ${{ github.token }}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Get latest release tag
        id: latest
        run: |
          latest_tag=$(gh api "repos/${{ github.repository }}/releases/latest" --jq '.tag_name' 2>/dev/null || echo "")
          echo "tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "Latest release tag: ${latest_tag:-none}"

      - name: Check for changes
        id: changes
        run: |
          latest_tag="${{ steps.latest.outputs.tag }}"
          
          if [[ -n "$latest_tag" ]]; then
            commit_count=$(git log --no-merges --oneline "${latest_tag}..HEAD" 2>/dev/null | wc -l)
          else
            commit_count=$(git log --no-merges --oneline -n 50 HEAD 2>/dev/null | wc -l)
          fi
          
          echo "commit_count=${commit_count}" >> "$GITHUB_OUTPUT"
          
          if [[ "$commit_count" -eq 0 ]]; then
            echo "::warning::No changes detected since last release. Skipping."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found ${commit_count} new commits"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine next version
        if: steps.changes.outputs.has_changes == 'true'
        id: version
        run: |
          latest_tag="${{ steps.latest.outputs.tag }}"
          
          # Parse latest version or start at 0.0.0
          if [[ -n "$latest_tag" ]]; then
            latest_version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$latest_version"
          else
            major=0
            minor=0
            patch=0
          fi
          
          # Analyze commits to determine bump type
          if [[ -n "$latest_tag" ]]; then
            commits=$(git log --no-merges --pretty='%s' "${latest_tag}..HEAD" 2>/dev/null)
          else
            commits=$(git log --no-merges --pretty='%s' -n 50 HEAD 2>/dev/null)
          fi
          
          # Check for breaking changes, features, or fixes
          if echo "$commits" | grep -qE '^(feat|fix|chore|docs|style|refactor|perf|test)(\([^)]+\))?:.*!'; then
            # Breaking change - major bump
            major=$((major + 1))
            minor=0
            patch=0
          elif echo "$commits" | grep -qE '^feat(\([^)]+\))?:'; then
            # New feature - minor bump
            minor=$((minor + 1))
            patch=0
          else
            # Default - patch bump
            patch=$((patch + 1))
          fi
          
          new_version="${major}.${minor}.${patch}"
          new_tag="v${new_version}"
          
          echo "version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${new_tag}" >> "$GITHUB_OUTPUT"
          echo "New version: ${new_tag} (from ${latest_tag:-initial})"

      - name: Check if release already exists
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          release_tag="${{ steps.version.outputs.tag }}"
          if gh release view "${release_tag}" >/dev/null 2>&1; then
            echo "::error::Release ${release_tag} already exists!"
            exit 1
          fi
          echo "Release ${release_tag} does not exist - ready to create"

      - name: Create and push tag
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          release_tag="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$release_tag" -m "Release $release_tag"
          git push origin "$release_tag"
          echo "Pushed tag: ${release_tag}"

      - name: Generate release notes
        if: steps.changes.outputs.has_changes == 'true'
        id: notes
        run: |
          current_tag="${{ steps.version.outputs.tag }}"
          previous_tag="${{ steps.latest.outputs.tag }}"
          
          notes_file="$RUNNER_TEMP/release-notes.md"
          repo="${{ github.repository }}"
          
          {
            echo "# ${current_tag}"
            echo
            
            if [[ -n "$previous_tag" ]]; then
              echo "Changes since **${previous_tag}**."
              echo
              echo "**Compare:** [${previous_tag}...${current_tag}](https://github.com/${repo}/compare/${previous_tag}...${current_tag})"
              echo
              echo "## Changes"
              echo
              git log --no-merges --reverse --pretty=format:'- %s ([%aL](https://github.com/%aL), [%h](https://github.com/'"${repo}"'/commit/%H))' "${previous_tag}..${current_tag}" 2>/dev/null || echo "(No changes)"
            else
              echo "Initial release"
              echo
              echo "## Latest changes"
              echo
              git log --no-merges --reverse --pretty=format:'- %s ([%aL](https://github.com/%aL), [%h](https://github.com/'"${repo}"'/commit/%H))' -n 15 HEAD
            fi
            
            echo
            echo
            echo "## Contributors"
            echo
            git log --no-merges --reverse --pretty='%aL' "${previous_tag}..${current_tag}" 2>/dev/null | sort -u | while read -r user; do
              echo "- [@${user}](https://github.com/${user})"
            done
          } > "${notes_file}"
          
          echo "file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file "${{ steps.notes.outputs.file }}"

      - name: Trigger production deployment
        if: steps.changes.outputs.has_changes == 'true'
        id: deploy
        run: |
          version="${{ steps.version.outputs.version }}"
          release_tag="${{ steps.version.outputs.tag }}"
          run_response=$(gh workflow run build-and-deploy.yml -f target=rpi5 -f version="$version" -r "$release_tag")
          run_id=$(echo "$run_response" | grep -oP 'https://github.com/.*/actions/runs/\K[0-9]+')
          echo "Deployment triggered: ${run_id}"
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment
        if: steps.deploy.outputs.run_id
        run: |
          gh run watch "${{ steps.deploy.outputs.run_id }}" --exit-status

      - name: Summary
        run: |
          if [[ "${{ steps.changes.outputs.has_changes }}" == "true" ]]; then
            echo "=== Release Complete ==="
            echo "Version: ${{ steps.version.outputs.tag }}"
            echo "Deployed to: rpi5 (production)"
          else
            echo "=== Release Skipped ==="
            echo "No changes detected since last release."
          fi

      - name: Post to Discord
        if: steps.changes.outputs.has_changes == 'true' && success()
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$VERSION"
          
          release_notes=$(cat "${{ steps.notes.outputs.file }}" | jq -Rs .)
          
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚀 New Build Deployed - Based & Operational\",
                \"description\": \"**${VERSION}** is now live on the Pi. The realm endures. Another W in the bag.\",
                \"url\": \"${RELEASE_URL}\",
                \"color\": 5763714,
                \"fields\": [
                  {
                    \"name\": \"Changes\",
                    \"value\": ${release_notes},
                    \"inline\": false
                  }
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"

      - name: No changes notification
        if: steps.changes.outputs.has_changes != 'true'
        run: |
          echo "::notice::No new changes to release. Workflow complete."
