---
# Manual operator flow:
# 1. Click this workflow and choose patch/minor/major.
# 2. The current package.json version is published as the Git tag
#    and GitHub Release.
# 3. Initial release notes are a one-off summary of the latest
#    updates. Later release notes are generated from the diff since
#    the last published release tag.
# 4. Docker image build is triggered and waited on.
# 5. After image push is confirmed, the next version bump is committed
#    directly to `main`. The bump is calculated from the latest
#    release tag, not package.json, for safety.
name: release

"on":
  workflow_dispatch:
    inputs:
      release_type:
        description: >-
          Select how package.json should be bumped after publishing
          the current version.
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Capture release version from package.json
        id: current
        shell: bash
        run: |
          current_version="$(node -p "require('./package.json').version")"
          echo "version=${current_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${current_version}" >> "$GITHUB_OUTPUT"

      - name: Inspect current release state
        id: release_state
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          release_tag="${{ steps.current.outputs.release_tag }}"
          tag_exists="false"
          release_exists="false"
          previous_tag=""

          echo "=== Release State ==="
          echo "package.json version: ${release_tag}"

          if git rev-parse "refs/tags/${release_tag}" >/dev/null 2>&1; then
            tag_exists="true"
            echo "Git tag: EXISTS"
          else
            echo "Git tag: NOT FOUND"
          fi

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            release_exists="true"
            echo "GitHub release: EXISTS"
          else
            echo "GitHub release: NOT FOUND"
          fi

          if previous_tag="$(
            gh api "repos/${{ github.repository }}/releases/latest" \
              --jq '.tag_name' 2>/dev/null
          )"; then
            echo "Latest release: ${previous_tag}"
          else
            previous_tag=""
            echo "Latest release: none"
          fi
          echo "====================="

          echo "tag_exists=${tag_exists}" >> "$GITHUB_OUTPUT"
          echo "release_exists=${release_exists}" >> "$GITHUB_OUTPUT"
          echo "tag=${previous_tag}" >> "$GITHUB_OUTPUT"

      - name: Fail if release already exists for this tag
        shell: bash
        run: |
          release_exists="${{ steps.release_state.outputs.release_exists }}"
          release_tag="${{ steps.current.outputs.release_tag }}"
          if [[ "${release_exists}" == "true" ]]; then
            echo "::error::Release ${release_tag} already exists!"
            echo "---"
            echo "Current package.json version: ${release_tag}"
            echo "Latest GitHub release: ${release_tag}"
            echo "---"
            echo "To create a new release:"
            echo "  1. Run: npm version patch (or minor/major)"
            echo "  2. Push the version bump to main"
            echo "  3. Rerun this workflow"
            exit 1
          fi

      - name: Fetch all tags
        run: |
          git fetch --tags --force

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          set +e
          
          current_tag="${{ steps.current.outputs.release_tag }}"
          previous_tag="${{ steps.release_state.outputs.tag }}"
          notes_file="$RUNNER_TEMP/release-notes.md"

          echo "Generating notes: current=${current_tag}, previous=${previous_tag}"

          {
            echo "# ${current_tag}"
            echo
            if [[ -n "${previous_tag}" ]]; then
              echo "Changes since ${previous_tag}."
              echo
              echo "Compare:"
              compare_url="https://github.com/${{ github.repository }}"
              compare_url="${compare_url}/compare/"
              compare_url="${compare_url}${previous_tag}...${current_tag}"
              echo "${compare_url}"
              echo
              echo "## Changes"
              git log --no-merges --reverse \
                --pretty='- %s (%h)' "${previous_tag}..${current_tag}" || echo "(No changes found)"
            else
              echo "Initial release."
              echo
              echo "This first release summarizes the latest bot updates."
              echo
              echo "## Latest updates"
              git log --no-merges --pretty='- %s (%h)' -n 15 HEAD
            fi
          } > "${notes_file}"

          set -e

          if ! grep -q '^- ' "${notes_file}"; then
            {
              echo
              echo \
                "- No user-facing commits were found in this release range."
            } >> "${notes_file}"
          fi

          echo "file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.current.outputs.release_tag }}" \
            --title "${{ steps.current.outputs.release_tag }}" \
            --notes-file "${{ steps.notes.outputs.file }}" \
            --generate-notes

      - name: Trigger buildx for release tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run buildx.yml -f release_tag="${{ steps.current.outputs.release_tag }}"
          echo "Triggered buildx workflow for ${{ steps.current.outputs.release_tag }}"

      - name: Calculate next version from latest release tag
        id: next
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          release_type="${{ inputs.release_type }}"
          
          latest_tag=$(gh api "repos/${{ github.repository }}/releases/latest" --jq '.tag_name')
          echo "Latest release tag: ${latest_tag}"
          
          major=$(echo "${latest_tag}" | cut -d. -f1 | tr -d 'v')
          minor=$(echo "${latest_tag}" | cut -d. -f2)
          patch=$(echo "${latest_tag}" | cut -d. -f3)

          case "${release_type}" in
            patch)
              patch=$((patch + 1))
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
          esac

          next_version="${major}.${minor}.${patch}"
          echo "Next version: ${next_version}"
          echo "version=${next_version}" >> "$GITHUB_OUTPUT"

      - name: Update package.json to next version
        shell: bash
        run: |
          next_version="${{ steps.next.outputs.version }}"
          npm version "${next_version}" --no-git-tag-version

      - name: Commit and push next version to main
        run: |
          git add package.json package-lock.json
          git commit \
            -m "chore: bump version to v${{ steps.next.outputs.version }}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"

      - name: Write release summary
        run: |
          previous_release_label="Previous release tag:"
          next_version_label="Next package.json version:"
          previous_release_tag_value="$(
            printf '%s' "${{ steps.release_state.outputs.tag || 'none' }}"
          )"
          previous_release_tag="${previous_release_tag_value}"
          next_package_version="v${{ steps.next.outputs.version }}"
          {
            echo "Released: v${{ steps.current.outputs.version }}"
            echo "${previous_release_label} ${previous_release_tag}"
            echo "${next_version_label} ${next_package_version}"
            echo "Post-release bump type: ${{ inputs.release_type }}"
            echo "Post-release bump delivery: direct push to main"
          } >> "$GITHUB_STEP_SUMMARY"
