---
# Manual operator flow:
# 1. Create and push a git tag: git tag v2.4.0 && git push origin v2.4.0
# 2. Run this workflow - it reads the version from the git tag
# 3. Creates GitHub release and deploys to production
# 
# Package.json version is independent - used only for npm dependencies.
name: release

"on":
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest release tag
        id: current
        run: |
          tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$tag" ]]; then
            echo "No tags found. Create one with: git tag v1.0.0 && git push origin v1.0.0"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
          else
            version="${tag#v}"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "Found tag: ${tag}"
          fi

      - name: Fail if no tag found
        if: steps.current.outputs.version == ''
        run: |
          echo "::error::No git tags found. Create a tag first:"
          echo "  git tag v1.0.0 && git push origin v1.0.0"
          exit 1

      - name: Check if release already exists
        id: release_state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_tag="${{ steps.current.outputs.release_tag }}"
          if gh release view "${release_tag}" >/dev/null 2>&1; then
            echo "::error::Release ${release_tag} already exists!"
            echo "Delete it first or use a new version tag."
            exit 1
          fi
          echo "Release ${release_tag} does not exist - ready to create"

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current_tag="${{ steps.current.outputs.release_tag }}"
          
          previous_tag=$(gh api "repos/${{ github.repository }}/releases/latest" --jq '.tag_name' 2>/dev/null || echo "")
          
          notes_file="$RUNNER_TEMP/release-notes.md"
          
          {
            echo "# ${current_tag}"
            echo
            if [[ -n "$previous_tag" ]] && [[ "$previous_tag" != "$current_tag" ]]; then
              echo "Changes since ${previous_tag}."
              echo
              echo "Compare:"
              echo "https://github.com/${{ github.repository }}/compare/${previous_tag}...${current_tag}"
              echo
              echo "## Changes"
              git log --no-merges --reverse --pretty='- %s (%h)' "${previous_tag}..${current_tag}" 2>/dev/null || echo "(No changes)"
            else
              echo "Initial release"
              echo
              echo "## Latest changes"
              git log --no-merges --pretty='- %s (%h)' -n 15 HEAD
            fi
          } > "${notes_file}"
          
          echo "file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.current.outputs.release_tag }}" \
            --title "${{ steps.current.outputs.release_tag }}" \
            --notes-file "${{ steps.notes.outputs.file }}" \
            --generate-notes

      - name: Trigger production deployment
        id: deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.current.outputs.version }}"
          run_id=$(gh workflow run build-and-deploy.yml -f target=rpi5 -f deploy_sha="$version" --json id --jq '.[0].id')
          echo "Deployment triggered: ${run_id}"
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment
        if: steps.deploy.outputs.run_id
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run watch "${{ steps.deploy.outputs.run_id }}" --exit-status

      - name: Summary
        run: |
          echo "=== Release Complete ==="
          echo "Version: ${{ steps.current.outputs.release_tag }}"
          echo "Deployed to: rpi5 (production)"
