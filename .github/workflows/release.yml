---
# Manual operator flow:
# 1. Click this workflow and choose patch/minor/major.
# 2. The current package.json version is published as the Git tag
#    and GitHub Release.
# 3. Release notes are generated from the diff since the last
#    published release tag.
# 4. The next version bump is opened as a PR instead of pushing
#    directly to `main` so branch protection stays intact and
#    semver progression remains reviewable.
name: release

"on":
  workflow_dispatch:
    inputs:
      release_type:
        description: >-
          Select how package.json should be bumped after publishing
          the current version.
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Capture release version from package.json
        id: current
        shell: bash
        run: |
          current_version="$(node -p "require('./package.json').version")"
          echo "version=${current_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${current_version}" >> "$GITHUB_OUTPUT"

      - name: Fail if release tag already exists
        shell: bash
        run: |
          if git rev-parse \
            "refs/tags/${{ steps.current.outputs.release_tag }}" \
            >/dev/null 2>&1; then
            echo "Tag ${{ steps.current.outputs.release_tag }} already exists."
            exit 1
          fi

      - name: Create and push release tag
        run: |
          git tag "${{ steps.current.outputs.release_tag }}"
          git push origin "${{ steps.current.outputs.release_tag }}"

      - name: Find previous published release tag
        id: previous
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          previous_tag="$(
            gh api "repos/${{ github.repository }}/releases/latest" \
              --jq '.tag_name' 2>/dev/null || true
          )"
          echo "tag=${previous_tag}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from last release diff
        id: notes
        shell: bash
        run: |
          current_tag="${{ steps.current.outputs.release_tag }}"
          previous_tag="${{ steps.previous.outputs.tag }}"
          notes_file="$RUNNER_TEMP/release-notes.md"

          {
            echo "# ${current_tag}"
            echo
            if [[ -n "${previous_tag}" ]]; then
              echo "Changes since ${previous_tag}."
              echo
              echo "Compare:"
              compare_url="https://github.com/${{ github.repository }}"
              compare_url="${compare_url}/compare/${previous_tag}...${current_tag}"
              echo "${compare_url}"
              echo
              echo "## Changes"
              git log --no-merges --reverse \
                --pretty='- %s (%h)' "${previous_tag}..HEAD"
            else
              echo "Initial release."
              echo
              echo "## Included commits"
              git log --no-merges --reverse --pretty='- %s (%h)'
            fi
          } > "${notes_file}"

          if ! grep -q '^- ' "${notes_file}"; then
            {
              echo
              echo \
                "- No user-facing commits were found in this release range."
            } >> "${notes_file}"
          fi

          echo "file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.current.outputs.release_tag }}" \
            --title "${{ steps.current.outputs.release_tag }}" \
            --notes-file "${{ steps.notes.outputs.file }}"

      - name: Bump package versions for the next cycle
        id: next
        shell: bash
        run: |
          npm version "${{ inputs.release_type }}" --no-git-tag-version
          next_version="$(node -p "require('./package.json').version")"
          echo "version=${next_version}" >> "$GITHUB_OUTPUT"

      - name: Create release bump branch
        id: bump_branch
        shell: bash
        run: |
          branch_name="release/bump-v${{ steps.next.outputs.version }}"
          git switch -c "${branch_name}"
          echo "branch=${branch_name}" >> "$GITHUB_OUTPUT"

      - name: Commit and push next version
        run: |
          git add package.json package-lock.json
          git commit \
            -m "chore: bump version to v${{ steps.next.outputs.version }}"
          git push --force-with-lease \
            origin "HEAD:${{ steps.bump_branch.outputs.branch }}"

      - name: Open release bump PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_body=$(cat <<EOF
          Automated post-release version bump after publishing
          ${{ steps.current.outputs.release_tag }}.

          This keeps \`package.json\` and \`package-lock.json\`
          moving forward through the normal reviewed PR flow.
          EOF
          )
          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "${{ steps.bump_branch.outputs.branch }}" \
            --title \
            "chore: bump version to v${{ steps.next.outputs.version }}" \
            --body "$pr_body"

      - name: Write release summary
        run: |
          previous_release_label="Previous release tag:"
          next_version_label="Next package.json version:"
          bump_branch_label="Release bump PR branch:"
          previous_release_tag="${{ steps.previous.outputs.tag || 'none' }}"
          next_package_version="v${{ steps.next.outputs.version }}"
          release_bump_branch="${{ steps.bump_branch.outputs.branch }}"
          {
            echo "Released: v${{ steps.current.outputs.version }}"
            echo "${previous_release_label} ${previous_release_tag}"
            echo "${next_version_label} ${next_package_version}"
            echo "Post-release bump type: ${{ inputs.release_type }}"
            echo "${bump_branch_label} ${release_bump_branch}"
          } >> "$GITHUB_STEP_SUMMARY"
